name: APK 빌드 및 릴리즈

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Android SDK 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/build-cache
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: Gradle Wrapper 생성 (없는 경우)
        run: |
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version=8.4
          fi

      - name: APK 빌드 (Debug)
        run: ./gradlew assembleDebug --stacktrace

      - name: APK 파일 이름 변경
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/MmsForwarder.apk
          echo "APK_PATH=release/MmsForwarder.apk" >> $GITHUB_ENV

      - name: APK 빌드 정보 출력
        run: |
          ls -lh release/
          echo "✅ APK 빌드 완료!"

      - name: APK 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: MmsForwarder-APK
          path: release/MmsForwarder.apk
          retention-days: 30

      - name: GitHub Release 생성
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "MMS Forwarder v1.0.${{ github.run_number }}"
          body: |
            ## MMS → n8n 전달 앱

            ### 설치 방법
            1. `MmsForwarder.apk` 다운로드
            2. 안드로이드 폰에서 파일 열기
            3. "알 수 없는 앱 설치" 허용
            4. 앱 설치 완료

            ### 설정 방법
            1. 앱 실행 후 권한 허용
            2. n8n 웹훅 URL 입력
            3. 서비스 시작

            > ⚠️ 설치 전 설정 → 보안 → 알 수 없는 앱 허용 필요
          files: release/MmsForwarder.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
