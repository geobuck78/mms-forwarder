name: APK 빌드 및 릴리즈

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 환경 확인 (디버그)
        run: |
          echo "=== Android SDK 경로 ==="
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          ls $ANDROID_HOME/platforms/ 2>/dev/null | tail -5 || echo "platforms 없음"
          ls $ANDROID_HOME/build-tools/ 2>/dev/null | tail -3 || echo "build-tools 없음"
          echo "=== Java 버전 ==="
          java -version

      - name: local.properties 생성 (SDK 경로 설정)
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: gradlew 실행 권한 부여
        run: |
          sed -i 's/\r//' gradlew
          chmod +x gradlew

      - name: APK 빌드
        run: ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tail -100

      - name: APK 이름 변경
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/MmsForwarder.apk
          ls -lh release/

      - name: APK 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: MmsForwarder-APK
          path: release/MmsForwarder.apk
          retention-days: 30

      - name: GitHub Release 생성
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "MMS Forwarder v1.0.${{ github.run_number }}"
          body: |
            ## 📱 MMS → n8n 전달 앱

            ### 설치 방법
            1. `MmsForwarder.apk` 다운로드
            2. 안드로이드 폰으로 파일 전송 (카카오톡 등)
            3. 설정 → 보안 → **알 수 없는 앱 설치 허용**
            4. APK 파일 클릭 → 설치
            5. 앱 실행 → 권한 허용 → 웹훅 URL 입력
          files: release/MmsForwarder.apk
          draft: false
          prerelease: false
