name: APK 빌드 및 릴리즈

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# 릴리즈 생성 권한 명시
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: gradlew CRLF → LF 변환 및 실행 권한 부여
        run: |
          sed -i 's/\r//' gradlew
          chmod +x gradlew

      - name: APK 빌드
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: APK 이름 변경
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/MmsForwarder.apk

      - name: APK 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: MmsForwarder-APK
          path: release/MmsForwarder.apk
          retention-days: 30

      - name: GitHub Release 생성
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "MMS Forwarder v1.0.${{ github.run_number }}"
          body: |
            ## 📱 MMS → n8n 전달 앱

            ### 설치 방법
            1. `MmsForwarder.apk` 다운로드
            2. 안드로이드 폰으로 파일 전송 (카카오톡 등)
            3. 설정 → 보안 → **알 수 없는 앱 설치 허용**
            4. APK 파일 클릭 → 설치
            5. 앱 실행 → 권한 허용 → 웹훅 URL 입력
          files: release/MmsForwarder.apk
          draft: false
          prerelease: false
